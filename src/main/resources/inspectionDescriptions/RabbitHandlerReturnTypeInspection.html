<html>
<body>
Reports <code>@RabbitHandler</code> functions that declare a return type other than <code>Unit</code>.
<p>
    Responses are sent by calling <code>respond(...)</code> on the request packet; the handler's
    return value is ignored by the runtime. A non-<code>Unit</code> return type is misleading.
</p>
</body>
